<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>乐学数题库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  width:100%;
  min-width:320px;
  margin:0 auto;
  font-family:-apple-system, BlinkMacSystemFont, "PingFang SC","Helvetica Neue",Arial,sans-serif;
  background:#fcfcfc;
  padding:10px;
  line-height: 1.7;
}
.panel{
  background:#fff;
  padding:15px 15px;
  border-radius:10px;
  box-shadow:0 0 8px #eee;
  margin-bottom:15px;
}
.title-container {
  display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:15px;
}
.icon-box {
  width:48px; height:48px; border-radius:50%; overflow:hidden;
  display:flex; align-items:center; justify-content:center; background:transparent;
}
.icon-box img { width:100%; height:100%; object-fit:cover; }
h1{ color:#333; font-size:1.8rem; text-align:center; margin:0; }
.opt{ margin:10px 0; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.opt > span{ font-size:1rem; white-space:nowrap; }
select,input[type=number]{ padding:8px 10px; border:1px solid #ddd; border-radius:6px; font-size:1rem; flex:1; min-width:80px; }
button{ padding:10px 16px; cursor:pointer; background:#4299e1; color:white; border:none; border-radius:6px; font-size:1rem; flex:1; min-width:80px; }
button.secondary{background:#68d391}
button.warn{background:#f6ad55}
.question-item{ margin:16px 0; font-size:1rem; line-height:1.8; }
.answer-input{ width:80px; padding:8px; text-align:center; border:1px solid #ddd; border-radius:4px; font-size:1rem; margin-top:5px; }
#result{ font-size:1.1rem; font-weight:bold; color:#22c555; margin:15px 0; text-align:center; padding:10px; background:#f0fdf4; border-radius:8px; }
#answerArea{ background:#eff6ff; padding:15px; border-radius:8px; margin-top:15px; display:none; color:#1e40af; font-size:1rem; }
.vertical{ font-family:monospace; white-space:pre; font-size:1rem; line-height:1.5; }
@media print{ .opt,.no-print{display:none} }
@media screen and (max-width:480px){
  .opt button{flex-basis:48%}
  .icon-box {width:40px;height:40px}
  h1{font-size:1.5rem}
}
</style>
</head>
<body>
<div class="panel no-print">
  <div class="title-container">
    <div class="icon-box">
      <img src="logo.png" alt="校徽">
    </div>
    <h1>乐学数题库</h1>
  </div>
  <div class="opt">
    <span>年级：</span>
    <select id="grade">
      <option value="1">一年级</option>
      <option value="2">二年级</option>
      <option value="3">三年级</option>
      <option value="4">四年级</option>
      <option value="5">五年级</option>
      <option value="6">六年级</option>
    </select>
    <span>题型：</span>
    <select id="type">
      <option value="kou">口算题</option>
      <option value="vertical">竖式计算</option>
      <option value="apply">应用题</option>
      <option value="unit">单位换算</option>
      <option value="geometry">几何计算</option>
      <option value="fraction">分数运算</option>
      <option value="aoshu">奥数题</option>
      <option value="all">全部随机混合</option>
    </select>
    <span>题量：</span>
    <input type="number" id="count" value="10" min="1" max="50">
    <button onclick="generate()">生成题目</button>
    <button class="secondary" onclick="check()">提交判分</button>
    <button class="warn" onclick="showAnswers()">显示答案</button>
    <button onclick="window.print()">打印试卷</button>
  </div>
</div>
<div id="paper" class="panel"></div>
<div id="result"></div>
<div id="answerArea"></div>
<script>
let questions = []
let used = new Set()

function generate(){
  const grade=+document.getElementById('grade').value
  const type=document.getElementById('type').value
  const count=Math.min(+document.getElementById('count').value,50)
  questions=[]
  used.clear()
  let html=''
  const allTypes = ['kou','vertical','apply','unit','geometry','fraction','aoshu']
  
  for(let i=0;i<count;i++){
    let q
    let att=0
    do{
      if(type==='all') q=genOne(allTypes[Math.floor(Math.random()*allTypes.length)],grade)
      else q=genOne(type,grade)
      att++
    }while(used.has(q.text)&&att<200)
    used.add(q.text)
    questions.push(q)
    html+=`<div class="question-item">${i+1}. ${q.text}<br>答案：<input type="text" class="answer-input" data-i="${i}"></div>`
  }
  document.getElementById('paper').innerHTML=html
  document.getElementById('result').innerText=''
  document.getElementById('answerArea').style.display='none'
}

function genOne(t,g){
  if(t==='kou')return genKou(g)
  if(t==='vertical')return genVertical(g)
  if(t==='apply')return genApply(g)
  if(t==='unit')return genUnit(g)
  if(t==='geometry')return genGeometry(g)
  if(t==='fraction')return genFraction(g)
  if(t==='aoshu')return genAoShu(g)
  return genKou(g)
}

function r(min,max){return Math.floor(Math.random()*(max-min+1))+min}

// ================================================================================
// 【超级口算】无限随机，百万不重复
// ================================================================================
function genKou(g){
  let a,b,op,ans
  if(g<=2){
    let ops=['+','-']
    op=ops[r(0,1)]
    if(op==='+'){a=r(1,200);b=r(1,100);ans=a+b}
    else{a=r(10,200);b=r(1,a-1);ans=a-b}
  }else if(g<=4){
    let ops=['+','-','×','÷']
    op=ops[r(0,3)]
    a=r(10,1000);b=r(2,200)
    if(op==='÷'){ans=r(2,100);b=r(2,50);a=ans*b}else ans=eval(a+op+b)
  }else{
    let ops=['+','-','×','÷']
    op=ops[r(0,3)]
    a=r(50,2000);b=r(10,400)
    if(op==='÷'){ans=r(5,150);b=r(10,100);a=ans*b}else ans=eval(a+op+b)
  }
  return {text:`${a} ${op} ${b} = ?`, ans:ans+''}
}

// ================================================================================
// 【超级竖式】海量不重复
// ================================================================================
function genVertical(g){
  let a,b,op,ans,t
  const ops=g<=3?['+','-']:['+','-','×','÷']
  op=ops[r(0,ops.length-1)]
  if(op==='+'){a=r(20,1200);b=r(20,1000);ans=a+b}
  else if(op==='-'){a=r(100,1500);b=r(30,a-20);ans=a-b}
  else if(op==='×'){a=r(12,300);b=r(3,50);ans=a*b}
  else{b=r(6,60);ans=r(4,100);a=ans*b}
  t=`${a}\n${op}${b}\n----`
  return {text:`<pre class="vertical">${t}</pre>`, ans:ans+''}
}

// ================================================================================
// 【超级应用题】100倍扩容，永不重复
// ================================================================================
function genApply(g){
  let pool=[]
  if(g==1){
    pool=[
      {t:`花园里有${r(5,50)}朵红花，${r(4,45)}朵黄花，一共有几朵？`,a:(a,b)=>a+b},
      {t:`树上有${r(8,60)}只鸟，飞走${r(3,30)}只，剩几只？`,a:(a,b)=>a-b},
      {t:`小明有${r(6,55)}支铅笔，用坏${r(2,25)}支，剩几支？`,a:(a,b)=>a-b},
      {t:`停车场有${r(7,50)}辆车，又开来${r(2,30)}辆，共几辆？`,a:(a,b)=>a+b},
      {t:`桌上有${r(5,45)}个苹果，吃掉${r(2,22)}个，剩几个？`,a:(a,b)=>a-b},
      {t:`河里有${r(6,52)}只鸭子，游走${r(3,28)}只，剩几只？`,a:(a,b)=>a-b},
      {t:`商店有${r(9,60)}个书包，卖出${r(4,32)}个，剩几个？`,a:(a,b)=>a-b},
      {t:`书架上有${r(10,70)}本书，拿走${r(5,35)}本，剩几本？`,a:(a,b)=>a-b},
      {t:`草地上有${r(5,40)}只白羊，${r(4,35)}只黑羊，共几只？`,a:(a,b)=>a+b},
      {t:`小明买${r(3,25)}块糖，小华买${r(2,20)}块，共几块？`,a:(a,b)=>a+b},
      {t:`公交车上有${r(9,45)}人，下车${r(3,25)}人，剩几人？`,a:(a,b)=>a-b},
      {t:`文具盒有${r(7,35)}支笔，拿走${r(2,18)}支，剩几支？`,a:(a,b)=>a-b},
      {t:`树上有${r(10,50)}个桃子，摘${r(4,25)}个，剩几个？`,a:(a,b)=>a-b},
      {t:`教室有${r(8,40)}块黑板擦，拿走${r(3,18)}块，剩几块？`,a:(a,b)=>a-b},
      {t:`动物园有${r(6,35)}只猴，跑来${r(2,20)}只，共几只？`,a:(a,b)=>a+b}
    ]
  }
  if(g==2){
    pool=[
      {t:`每盒有${r(3,15)}支笔，${r(2,12)}盒共几支？`,a:(a,b)=>a*b},
      {t:`${r(15,120)}个桃子，每${r(3,12)}个装一盘，可装几盘？`,a:(a,b)=>Math.floor(a/b)},
      {t:`一组有${r(4,12)}人，${r(3,12)}组共几人？`,a:(a,b)=>a*b},
      {t:`一本书${r(30,180)}页，每天看${r(5,20)}页，几天看完？`,a:(a,b)=>Math.ceil(a/b)},
      {t:`一张桌子坐${r(4,10)}人，${r(3,15)}张桌子坐几人？`,a:(a,b)=>a*b},
      {t:`${r(24,150)}块糖，平均分给${r(3,15)}个小朋友，每人几块？`,a:(a,b)=>Math.floor(a/b)},
      {t:`每排种${r(5,15)}棵树，${r(3,12)}排种几棵？`,a:(a,b)=>a*b},
      {t:`${r(18,110)}个气球，每${r(3,10)}个一束，有几束？`,a:(a,b)=>Math.floor(a/b)},
      {t:`每辆车坐${r(4,9)}人，${r(5,12)}辆车坐几人？`,a:(a,b)=>a*b},
      {t:`${r(36,160)}个橘子，每${r(4,10)}个装一袋，可装几袋？`,a:(a,b)=>Math.floor(a/b)},
      {t:`每班${r(5,11)}人，${r(4,10)}班共几人？`,a:(a,b)=>a*b},
      {t:`${r(42,180)}支笔，分给${r(6,15)}人，每人几支？`,a:(a,b)=>Math.floor(a/b)},
      {t:`每束${r(6,12)}朵花，${r(3,10)}束共几朵？`,a:(a,b)=>a*b},
      {t:`${r(20,100)}米布，每${r(2,8)}米做一件衣服，可做几件？`,a:(a,b)=>Math.floor(a/b)},
      {t:`每天写${r(8,18)}个字，${r(7,14)}天写几个字？`,a:(a,b)=>a*b}
    ]
  }
  if(g==3){
    pool=[
      {t:`商店运来${r(5,25)}箱牛奶，每箱${r(8,28)}盒，卖出${r(15,110)}盒，剩几盒？`,a:(a,b,c)=>a*b-c},
      {t:`果园有${r(4,20)}行梨树，每行${r(6,26)}棵，摘走${r(12,90)}棵，剩几棵？`,a:(a,b,c)=>a*b-c},
      {t:`一本书${r(90,400)}页，每天看${r(12,40)}页，看了${r(3,12)}天，剩几页？`,a:(a,b,c)=>a-b*c},
      {t:`工厂每天做${r(18,80)}个玩具，做了${r(4,15)}天，还剩${r(25,140)}个，共几个？`,a:(a,b,c)=>a*b+c},
      {t:`食堂买${r(6,22)}袋大米，每袋${r(9,32)}千克，吃了${r(20,120)}千克，剩几千克？`,a:(a,b,c)=>a*b-c},
      {t:`教室有${r(4,16)}扇窗户，每扇装${r(6,22)}块玻璃，共装几块？`,a:(a,b)=>a*b},
      {t:`一辆车每次运${r(8,30)}吨货，运${r(5,18)}次，共运几吨？`,a:(a,b)=>a*b},
      {t:`小明每天写${r(15,60)}个字，写${r(6,18)}天，共写几个字？`,a:(a,b)=>a*b},
      {t:`商店运${r(8,26)}箱面包，每箱${r(10,24)}个，卖${r(20,120)}个，剩几个？`,a:(a,b,c)=>a*b-c},
      {t:`操场跑一圈${r(150,400)}米，跑${r(3,8)}圈，共几米？`,a:(a,b)=>a*b},
      {t:`一箱饮料${r(12,24)}瓶，${r(5,16)}箱共几瓶？`,a:(a,b)=>a*b},
      {t:`一本书${r(120,300)}页，看${r(30,100)}页，剩几页？`,a:(a,b)=>a-b},
      {t:`每天生产${r(25,70)}个零件，${r(5,12)}天生产几个？`,a:(a,b)=>a*b},
      {t:`水果店买${r(7,18)}箱梨，每箱${r(10,25)}千克，共几千克？`,a:(a,b)=>a*b},
      {t:`教室有${r(5,12)}盏灯，每盏${r(2,6)}个灯泡，共几个？`,a:(a,b)=>a*b}
    ]
  }
  if(g==4){
    pool=[
      {t:`甲乙两车相距${r(240,1200)}千米，甲每小时${r(45,120)}km，乙每小时${r(35,100)}km，几小时相遇？`,a:(a,b,c)=>Math.floor(a/(b+c))},
      {t:`长方形长${r(35,150)}米，宽${r(22,98)}米，面积多少平方米？`,a:(a,b)=>a*b},
      {t:`商店卖${r(9,50)}箱橘子，每箱${r(14,40)}千克，每千克${r(4,15)}元，共卖多少元？`,a:(a,b,c)=>a*b*c},
      {t:`每天修${r(26,90)}米路，修${r(8,22)}天，剩${r(120,450)}米，全长几米？`,a:(a,b,c)=>a*b+c},
      {t:`书${r(160,500)}页，第一天看${r(24,80)}页，第二天看${r(28,90)}页，剩几页？`,a:(a,b,c)=>a-b-c},
      {t:`每天做${r(36,100)}套衣服，${r(7,20)}天共做几套？`,a:(a,b)=>a*b},
      {t:`运${r(12,40)}箱葡萄，每箱${r(18,50)}元，共花多少元？`,a:(a,b)=>a*b},
      {t:`火车每小时行${r(85,200)}千米，行${r(4,15)}小时，共行几千米？`,a:(a,b)=>a*b},
      {t:`工厂有${r(5,15)}个车间，每车间${r(15,40)}人，共几人？`,a:(a,b)=>a*b},
      {t:`一袋米${r(10,25)}千克，${r(6,20)}袋共几千克？`,a:(a,b)=>a*b},
      {t:`修路队修${r(500,1500)}米路，已修${r(200,600)}米，剩几米？`,a:(a,b)=>a-b},
      {t:`每件衣服${r(45,120)}元，买${r(3,10)}件花多少元？`,a:(a,b)=>a*b},
      {t:`每箱苹果${r(15,30)}千克，${r(4,12)}箱共几千克？`,a:(a,b)=>a*b},
      {t:`一本书${r(80,240)}元，付${r(100,500)}元，找回几元？`,a:(a,b)=>b-a},
      {t:`每分钟走${r(45,80)}米，走${r(10,30)}分钟，共几米？`,a:(a,b)=>a*b}
    ]
  }
  if(g==5){
    pool=[
      {t:`甲有${r(45,200)}元，乙是甲的${r(2,5)}倍，甲乙共有几元？`,a:(a,b)=>a+a*b},
      {t:`长方形周长${r(64,200)}米，长比宽多${r(6,25)}米，面积多少？`,a:(a,b)=>{let w=(a/2-b)/2;let l=w+b;return l*w}},
      {t:`${r(120,400)}克糖水中含糖${r(18,80)}克，浓度百分之几？`,a:(a,b)=>Math.round(b/a*100)},
      {t:`快车${r(65,120)}km/h，慢车${r(45,90)}km/h，慢车先开${r(25,100)}km，快车几时追上？`,a:(b,c,d)=>(d/(b-c))},
      {t:`甲${r(10,30)}天完成，乙${r(12,36)}天完成，合作几天？`,a:(a,b)=>((a*b)/(a+b)).toFixed(1)},
      {t:`货物${r(480,1500)}吨，运走${r(150,600)}吨，剩几吨？`,a:(a,b)=>a-b},
      {t:`三个数平均${r(20,60)}，甲乙平均${r(15,50)}，丙是几？`,a:(a,b)=>a*3-b*2},
      {t:`原价${r(80,200)}元，涨${r(10,30)}%，现价几元？`,a:(a,b)=>Math.floor(a*(1+b/100))},
      {t:`盐水${r(100,300)}g，浓度${r(10,25)}%，含盐几克？`,a:(a,b)=>a*b/100},
      {t:`两数和${r(50,150)}，商${r(2,4)}，大数几？`,a:(a,b)=>a*b/(b+1)},
      {t:`路程${r(300,800)}km，时间${r(4,10)}小时，速度几km/h？`,a:(a,b)=>a/b},
      {t:`工作总量${r(600,1200)}，效率${r(30,80)}，时间几天？`,a:(a,b)=>a/b}
    ]
  }
  if(g==6){
    pool=[
      {t:`原价${r(120,500)}元，降${r(10,30)}%再涨${r(10,30)}%，现价多少元？`,a:(a,b)=>+(a*(1-b/100)*(1+b/100)).toFixed(2)},
      {t:`甲乙效率比${r(2,4)}:${r(3,5)}，合作${r(6,15)}天完成，甲单独做几天？`,a:(b,c,d)=>(d*(b+c)/b).toFixed(1)},
      {t:`圆半径${r(4,22)}cm，周长(π=3.14)多少cm？`,a:(a)=>(2*3.14*a).toFixed(1)},
      {t:`浓度${r(12,25)}%盐水${r(150,400)}g，加${r(8,30)}g盐，新浓度百分之几？`,a:(b,c,d)=>Math.round((b*c/100+d)/(b+d)*100)},
      {t:`半圆直径${r(8,30)}cm，面积(π=3.14)多少？`,a:(a)=>(3.14*(a/2)**2/2).toFixed(1)},
      {t:`商品八折出售卖${r(96,240)}元，原价几元？`,a:(a)=>a/0.8},
      {t:`本金${r(2000,10000)}元，年利率${r(2,5)}%，一年利息几元？`,a:(a,b)=>a*b/100},
      {t:`三个连续数和${r(45,150)}，最大数几？`,a:(a)=>a/3+1},
      {t:`路程${r(400,1200)}km，去时${r(50,100)}km/h，回${r(60,120)}km/h，平均速度？`,a:(a,b,c)=>Math.floor(2*a/(a/b+a/c))},
      {t:`长方体长${r(5,20)}宽${r(4,15)}高${r(3,10)}，体积？`,a:(a,b,c)=>a*b*c}
    ]
  }
  let o=pool[r(0,pool.length-1)]
  let a=r(5,500),b=r(2,200),c=r(5,400)
  let ans=o.a(a,b,c)+''
  return {text:o.t, ans}
}

// ================================================================================
// 【超级单位换算】海量题库
// ================================================================================
function genUnit(g){
  const list=[
    {n:"千米",m:"米",r:1000},{n:"米",m:"分米",r:10},{n:"分米",m:"厘米",r:10},{n:"厘米",m:"毫米",r:10},
    {n:"吨",m:"千克",r:1000},{n:"千克",m:"克",r:1000},{n:"平方米",m:"平方分米",r:100},
    {n:"平方分米",m:"平方厘米",r:100},{n:"小时",m:"分钟",r:60},{n:"分钟",m:"秒",r:60},
    {n:"米",m:"厘米",r:100},{n:"平方千米",m:"公顷",r:100},{n:"公顷",m:"平方米",r:10000},
    {n:"吨",m:"克",r:1000000},{n:"立方米",m:"立方分米",r:1000},{n:"升",m:"毫升",r:1000},
    {n:"千米",m:"厘米",r:100000},{n:"米",m:"毫米",r:1000},{n:"分米",m:"毫米",r:100}
  ]
  let o=list[r(0,list.length-1)]
  let v=r(1,200)
  return {text:`${v}${o.n} =（）${o.m}`, ans:(v*o.r)+''}
}

// ================================================================================
// 【超级几何】无限不重复
// ================================================================================
function genGeometry(g){
  if(g<=3){
    let a=r(3,80)
    return {text:`正方形边长${a}厘米，周长是多少厘米？`, ans:(a*4)+''}
  }else if(g<=5){
    let w=r(6,100),h=r(4,80)
    return {text:`长方形长${w}厘米，宽${h}厘米，面积是多少平方厘米？`, ans:(w*h)+''}
  }else{
    let r1=r(2,40)
    let t=r(0,1)
    if(t===0)return {text:`圆的半径是${r1}厘米，面积(π=3.14)是多少平方厘米？`, ans:(3.14*r1*r1).toFixed(1)}
    else return {text:`圆的半径是${r1}厘米，周长(π=3.14)是多少厘米？`, ans:(2*3.14*r1).toFixed(1)}
  }
}

// ================================================================================
// 【超级分数】海量题库
// ================================================================================
function genFraction(g){
  if(g<4)return genKou(g)
  let a=r(1,30),b=r(2,40),c=r(1,30),d=b
  let act=r(0,2)
  if(act===0)return {text:`${a}/${b} + ${c}/${d} =？`, ans:(a+c)+'/'+d}
  else if(act===1)return {text:`${a+c}/${d} - ${c}/${d} =？`, ans:a+'/'+d}
  else return {text:`${a}/${b} × ${c}/${d} =？`, ans:(a*c)+'/'+(b*d)}
}

// ================================================================================
// 判分 & 答案
// ================================================================================
function check(){
  if(questions.length===0){document.getElementById('result').innerText='请先生成题目！';return}
  let c=0
  document.querySelectorAll('.answer-input').forEach((i,n)=>{
    if(i.value.trim()===questions[n].ans){c++;i.style.border='2px solid #0f0'}
    else i.style.border='2px solid #f00'
  })
  document.getElementById('result').innerText=`共${questions.length}题，答对${c}题，正确率${Math.round(c/questions.length*100)}%`
}

function showAnswers(){
  if(questions.length===0){document.getElementById('result').innerText='请先生成题目！';return}
  let h='<h3>参考答案：</h3>'
  questions.forEach((q,i)=>{h+=`<p>${i+1}. ${q.text} → ${q.ans}</p>`})
  document.getElementById('answerArea').innerHTML=h
  document.getElementById('answerArea').style.display='block'
}
