<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>凤小数学题库</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  width:100%;
  min-width:320px;
  margin:0 auto;
  font-family:-apple-system, BlinkMacSystemFont, "PingFang SC","Helvetica Neue",Arial,sans-serif;
  background:#fcfcfc;
  padding:10px;
  line-height: 1.7;
}
.panel{
  background:#fff;
  padding:15px 15px;
  border-radius:10px;
  box-shadow:0 0 8px #eee;
  margin-bottom:15px;
}
.title-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom:15px;
}
/* 校徽样式（圆形、透明背景） */
.icon-box {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
}
.icon-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
h1{
  color:#333;
  font-size:1.8rem;
  text-align:center;
  margin:0;
}
.opt{
  margin:10px 0;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
.opt > span{
  font-size:1rem;
  white-space:nowrap;
}
select,input[type=number]{
  padding:8px 10px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:1rem;
  flex:1;
  min-width:80px;
}
button{
  padding:10px 16px;
  cursor:pointer;
  background:#4299e1;
  color:white;
  border:none;
  border-radius:6px;
  font-size:1rem;
  flex:1;
  min-width:80px;
}
button.secondary{background:#68d391}
button.warn{background:#f6ad55}
.question-item{
  margin:16px 0;
  font-size:1rem;
  line-height:1.8;
}
.answer-input{
  width:80px;
  padding:8px;
  text-align:center;
  border:1px solid #ddd;
  border-radius:4px;
  font-size:1rem;
  margin-top:5px;
}
#result{
  font-size:1.1rem;
  font-weight:bold;
  color:#22c55e;
  margin:15px 0;
  text-align:center;
  padding:10px;
  background:#f0fdf4;
  border-radius:8px;
}
#answerArea{
  background:#eff6ff;
  padding:15px;
  border-radius:8px;
  margin-top:15px;
  display:none;
  color:#1e40af;
  font-size:1rem;
}
.vertical{
  font-family:monospace;
  white-space:pre;
  font-size:1rem;
  line-height:1.5;
}
@media print{
  .opt,.no-print{display:none}
}
@media screen and (max-width:480px){
  .opt button{flex-basis:48%}
  .icon-box {width:40px;height:40px}
  h1{font-size:1.5rem}
}
</style>
</head>
<body>
<div class="panel no-print">
  <div class="title-container">
    <!-- 已替换为校徽图片 -->
    <div class="icon-box">
      <img src="logo.png" alt="校徽">
    </div>
    <h1>凤小数学题库</h1>
  </div>
  <div class="opt">
    <span>年级：</span>
    <select id="grade">
      <option value="1">一年级</option>
      <option value="2">二年级</option>
      <option value="3">三年级</option>
      <option value="4">四年级</option>
      <option value="5">五年级</option>
      <option value="6">六年级</option>
    </select>
    <span>题型：</span>
    <select id="type">
      <option value="kou">口算题</option>
      <option value="vertical">竖式计算</option>
      <option value="apply">应用题</option>
      <option value="all">全部随机混合</option>
    </select>
    <span>题量：</span>
    <input type="number" id="count" value="10" min="1" max=50>
    <button onclick="generate()">生成题目</button>
    <button class="secondary" onclick="check()">提交判分</button>
    <button class="warn" onclick="showAnswers()">显示答案</button>
    <button onclick="window.print()">打印试卷</button>
  </div>
</div>
<div id="paper" class="panel"></div>
<div id="result"></div>
<div id="answerArea"></div>
<script>
let questions = []
function generate(){
  const grade=+document.getElementById('grade').value
  const type=document.getElementById('type').value
  const count=Math.min(+document.getElementById('count').value,50)
  questions=[]
  let html=''
  for(let i=0;i<count;i++){
    let q
    if(type==='all'){
      const ts=['kou','vertical','apply']
      q=genOne(ts[Math.floor(Math.random()*ts.length)],grade)
    }else{
      q=genOne(type,grade)
    }
    questions.push(q)
    html+=`<div class="question-item">${i+1}. ${q.text}<br>答案：<input type="text" class="answer-input" data-i="${i}"></div>`
  }
  document.getElementById('paper').innerHTML=html
  document.getElementById('result').innerText=''
  document.getElementById('answerArea').style.display='none'
}
function genOne(t,g){
  if(t==='kou')return genKou(g)
  if(t==='vertical')return genVertical(g)
  if(t==='apply')return genApply(g)
  return genKou(g)
}
function r(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function genKou(g){
  let a,b,op,ans
  if(g<=2){a=r(1,50);b=r(1,50);op=['+','-'][r(0,1)];ans=op=='+'?a+b:a-b;if(ans<0)return genKou(g)}
  else if(g<=4){a=r(10,300);b=r(10,300);op=['+','-','×','÷'][r(0,3)];if(op=='÷'){ans=r(1,30);b=r(1,30);a=ans*b}else ans=op=='+'?a+b:op=='-'?a-b:a*b}
  else{a=r(50,800);b=r(50,800);op=['+','-','×','÷'][r(0,3)];if(op=='÷'){ans=r(2,60);b=r(2,60);a=ans*b}else ans=op=='+'?a+b:op=='-'?a-b:a*b}
  return {text:`${a} ${op} ${b} = ?`, ans:ans+''}
}
function genVertical(g){
  let a,b,op,ans,t
  const ops=g<=3?['+','-']:['+','-','×','÷']
  op=ops[r(0,ops.length-1)]
  if(op==='+'){a=r(10,300);b=r(10,300);ans=a+b;t=`${a}\n+${b}\n----`}
  else if(op==='-'){a=r(50,300);b=r(10,a-10);ans=a-b;t=`${a}\n-${b}\n----`}
  else if(op==='×'){a=r(10,50);b=r(2,10);ans=a*b;t=`${a}\n×${b}\n----`}
  else{b=r(2,10);ans=r(5,30);a=ans*b;t=`${a}\n÷${b}\n----`}
  return {text:`<pre class="vertical">${t}</pre>`, ans:ans+''}
}
function genApply(g){
  let a=r(10,100),b=r(10,100)
  return {text:`学校有${a}本故事书，又买来${b}本，一共有多少本？`, ans:(a+b)+''}
}
function check(){
  if(questions.length===0){document.getElementById('result').innerText='请先生成题目！';return}
  let c=0
  document.querySelectorAll('.answer-input').forEach((i,n)=>{
    if(i.value.trim()===questions[n].ans){c++;i.style.border='2px solid #0f0'}
    else i.style.border='2px solid #f00'
  })
  document.getElementById('result').innerText=`共${questions.length}题，答对${c}题，正确率${Math.round(c/questions.length*100)}%`
}
function showAnswers(){
  if(questions.length===0){document.getElementById('result').innerText='请先生成题目！';return}
  let h='<h3>参考答案：</h3>'
  questions.forEach((q,i)=>{h+=`<p>${i+1}. ${q.text} → ${q.ans}</p>`})
  document.getElementById('answerArea').innerHTML=h
  document.getElementById('answerArea').style.display='block'
}
</script>
</body>
</html>
